<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FlowBuilder AI — Визуальный конструктор</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a2e;--surface3:#232340;--border:#2a2a4a;--text:#e0e0ff;--text2:#8888aa;--accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.3);--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--cyan:#06b6d4;--pink:#ec4899;--purple:#a855f7}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
.topbar{height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100}
.topbar .logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .project-name{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);font-size:13px;outline:none;width:180px}
.topbar .project-name:focus{border-color:var(--accent)}
.topbar .sep{width:1px;height:24px;background:var(--border);margin:0 4px}
.topbar button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.topbar button:hover{background:var(--surface3);color:var(--text);border-color:var(--accent)}
.topbar button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.topbar button.primary:hover{background:var(--accent2)}
.topbar .spacer{flex:1}
.topbar .stats{font-size:11px;color:var(--text2);display:flex;gap:12px}
.main{display:flex;height:calc(100vh - 48px - 32px)}
.sidebar-left{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-left .search-box{padding:8px;border-bottom:1px solid var(--border);position:relative}
.sidebar-left .search-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px 7px 30px;color:var(--text);font-size:12px;outline:none}
.sidebar-left .search-box input:focus{border-color:var(--accent)}
.sidebar-left .search-box::before{content:'🔍';position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:12px}
.block-list{flex:1;overflow-y:auto;padding:4px 0}
.category-header{padding:6px 12px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.category-header .arrow{transition:transform .2s}
.category-header.collapsed .arrow{transform:rotate(-90deg)}
.category-items{padding:0 6px 4px}
.category-items.hidden{display:none}
.block-item{padding:6px 8px;border-radius:6px;font-size:12px;cursor:grab;display:flex;align-items:center;gap:8px;transition:all .15s;border:1px solid transparent}
.block-item:hover{background:var(--surface2);border-color:var(--border)}
.block-item .icon{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.block-item .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.canvas-container{flex:1;position:relative;overflow:hidden;background:var(--bg);cursor:grab}
.canvas-container.panning{cursor:grabbing}
.canvas-bg{position:absolute;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:24px 24px;opacity:.4}
svg#mainSvg{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
.canvas-blocks{position:absolute;inset:0;pointer-events:none}
.block{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:160px;cursor:move;pointer-events:all;transition:box-shadow .15s;user-select:none}
.block:hover{box-shadow:0 0 20px rgba(99,102,241,.15)}
.block.selected{border-color:var(--accent);box-shadow:0 0 25px var(--accent-glow)}
.block-header{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;border-radius:10px 10px 0 0;font-size:12px;font-weight:600}
.block-header .icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.block-header .title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.block-header .delete{opacity:0;cursor:pointer;font-size:14px;color:var(--red);transition:opacity .15s}
.block:hover .block-header .delete{opacity:.7}
.block-header .delete:hover{opacity:1}
.block-body{padding:8px 10px;font-size:11px;color:var(--text2)}
.block-ports{display:flex;justify-content:space-between;padding:4px 0}
.port{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--surface);position:absolute;cursor:crosshair;transition:all .15s;z-index:5}
.port:hover{transform:scale(1.4);border-color:var(--accent);background:var(--accent)}
.port.input{left:-6px}
.port.output{right:-6px}
.sidebar-right{width:300px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
.sidebar-tabs button{flex:1;padding:10px;background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;border-bottom:2px solid transparent}
.sidebar-tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{flex:1;overflow-y:auto;padding:12px}
.tab-content.hidden{display:none}
.prop-group{margin-bottom:12px}
.prop-group label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px}
.prop-group input,.prop-group select,.prop-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.prop-group input:focus,.prop-group select:focus,.prop-group textarea:focus{border-color:var(--accent)}
.no-selection{text-align:center;color:var(--text2);font-size:13px;padding:40px 20px}
.no-selection .icon{font-size:40px;margin-bottom:12px}
.chat-messages{flex:1;overflow-y:auto;padding:8px}
.chat-msg{padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:12px;max-width:90%;word-wrap:break-word}
.chat-msg.user{background:var(--accent);color:#fff;margin-left:auto;border-bottom-right-radius:2px}
.chat-msg.ai{background:var(--surface2);color:var(--text);border-bottom-left-radius:2px}
.chat-msg.ai .suggestion-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chat-msg.ai .chip{background:var(--surface3);border:1px solid var(--border);padding:3px 8px;border-radius:12px;font-size:10px;cursor:pointer}
.chat-msg.ai .chip:hover{border-color:var(--accent);color:var(--accent)}
.chat-input-area{padding:8px;border-top:1px solid var(--border);display:flex;gap:6px}
.chat-input-area input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;outline:none}
.chat-input-area button{background:var(--accent);border:none;color:#fff;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.bottombar{height:32px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--text2);gap:16px}
.bottombar .log{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.zoom-controls{position:absolute;bottom:12px;left:12px;display:flex;gap:4px;z-index:50}
.zoom-controls button{width:32px;height:32px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.zoom-controls button:hover{background:var(--surface2);border-color:var(--accent)}
.nav-controls{position:absolute;bottom:12px;left:100px;display:flex;gap:4px;z-index:50}
.nav-controls button{width:32px;height:32px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:14px}
.nav-controls button:hover{background:var(--surface2);border-color:var(--accent)}
.minimap{position:absolute;bottom:12px;right:12px;width:160px;height:100px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;z-index:50;opacity:.8;cursor:pointer}
.minimap:hover{opacity:1}
.minimap canvas{width:100%;height:100%}
.toast-container{position:fixed;top:60px;right:16px;z-index:3000;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;animation:slideIn .3s ease}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:var(--red);color:#fff}
.toast.info{background:var(--accent);color:#fff}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">⚡ FlowBuilder AI</div>
  <input class="project-name" value="My Workflow" id="projectName">
  <div class="sep"></div>
  <button onclick="undo()">↩ Undo</button>
  <button onclick="redo()">↪ Redo</button>
  <div class="sep"></div>
  <button onclick="saveProject()">💾 Save</button>
  <button onclick="loadProject()">📂 Load</button>
  <button onclick="exportJSON()">📤 Export</button>
  <div class="spacer"></div>
  <div class="stats"><span id="blockCount">0 blocks</span><span id="connCount">0 connections</span></div>
  <button class="primary" onclick="runWorkflow()">▶ Run</button>
</div>
<div class="main">
  <div class="sidebar-left">
    <div class="search-box"><input placeholder="Search blocks..." id="blockSearch" oninput="filterBlocks()"></div>
    <div class="block-list" id="blockList"></div>
  </div>
  <div class="canvas-container" id="canvasContainer">
    <div class="canvas-bg" id="canvasBg"></div>
    <svg id="mainSvg"></svg>
    <div class="canvas-blocks" id="canvasBlocks"></div>
    <div class="zoom-controls"><button onclick="zoomIn()">+</button><span id="zoomLevel">100%</span><button onclick="zoomOut()">−</button><button onclick="zoomReset()">⊡</button></div>
    <div class="nav-controls"><button onclick="panLeft()">◀</button><button onclick="panRight()">▶</button><button onclick="panUp()">▲</button><button onclick="panDown()">▼</button><button onclick="centerAll()">⦿</button></div>
    <div class="minimap" id="minimap"><canvas id="minimapCanvas"></canvas></div>
  </div>
  <div class="sidebar-right">
    <div class="sidebar-tabs"><button class="active" onclick="switchTab('props')">📋 Properties</button><button onclick="switchTab('ai')">🤖 AI</button></div>
    <div class="tab-content" id="tabProps"><div class="no-selection" id="noSelection"><div class="icon">🎯</div><p>Select a block to edit</p></div><div id="propsContent" style="display:none"></div></div>
    <div class="tab-content hidden" id="tabAI"><div class="chat-messages" id="chatMessages"><div class="chat-msg ai">👋 Describe what you want to build:<div class="suggestion-chips"><span class="chip" onclick="aiSuggest('Email automation')">📧 Email</span><span class="chip" onclick="aiSuggest('Data pipeline')">📊 Data pipeline</span><span class="chip" onclick="aiSuggest('Call to phone')">📞 Voice call</span></div></div></div><div class="chat-input-area"><input placeholder="Describe your workflow..." id="chatInput" onkeydown="if(event.key==='Enter')sendChat()"><button onclick="sendChat()">Send</button></div></div>
  </div>
</div>
<div class="bottombar"><span>⚡ FlowBuilder AI</span><div class="sep" style="height:16px"></div><span class="log" id="logOutput">Ready</span><span id="cursorPos">0, 0</span></div>
<div class="toast-container" id="toastContainer"></div>
<script>
// ==================== БЛОКИ ====================
const CATEGORIES = [
  {id:'ai',name:'AI & ML',color:'#8b5cf6',icon:'🧠',blocks:[
    {id:'text_gen',name:'Text Generation',icon:'📝',desc:'Generate text with AI',ports:{in:1,out:1}},
    {id:'chatbot',name:'Chatbot',icon:'💬',desc:'Conversational AI',ports:{in:1,out:1}},
    {id:'tts',name:'Text to Speech',icon:'🔊',desc:'Convert text to speech',ports:{in:1,out:1}}
  ]},
  {id:'msg',name:'Messaging',color:'#22c55e',icon:'💬',blocks:[
    {id:'email_send',name:'Email Send',icon:'📧',desc:'Send email',ports:{in:1,out:1}},
    {id:'slack',name:'Slack',icon:'💜',desc:'Send Slack message',ports:{in:1,out:1}},
    {id:'call',name:'Voice Call',icon:'📞',desc:'Make phone call via InOut.bot',ports:{in:1,out:1}}
  ]},
  {id:'logic',name:'Logic',color:'#f97316',icon:'⚡',blocks:[
    {id:'if_else',name:'If/Else',icon:'🔀',desc:'Conditional branch',ports:{in:1,out:2}},
    {id:'delay',name:'Delay',icon:'⏱️',desc:'Wait milliseconds',ports:{in:1,out:1}},
    {id:'http_req',name:'HTTP Request',icon:'🌐',desc:'Make HTTP request',ports:{in:1,out:1}}
  ]},
  {id:'site',name:'Website',color:'#06b6d4',icon:'🌐',blocks:[
    {id:'site_main',name:'Site',icon:'🌐',desc:'Main website block',ports:{in:0,out:1}},
    {id:'site_menu',name:'Menu',icon:'☰',desc:'Navigation menu',ports:{in:1,out:1}},
    {id:'site_section',name:'Section',icon:'📄',desc:'Content section',ports:{in:1,out:1}},
    {id:'site_footer',name:'Footer',icon:'🔻',desc:'Page footer',ports:{in:1,out:0}}
  ]}
];

// ==================== СОСТОЯНИЕ ====================
let blocks = [];
let connections = [];
let selectedBlocks = new Set();
let dragBlock = null;
let dragOffset = {x:0, y:0};
let pan = {x:0, y:0};
let zoom = 1;
let isPanning = false;
let panStart = {x:0, y:0};
let connecting = null;
let undoStack = [], redoStack = [];
let nextId = 1;

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
window.onload = () => {
  renderBlockList();
  setupCanvasEvents();
  updateStats();
  log('Ready — drag blocks from left panel');
  updateCanvasTransform();
  loadDemoBlocks();
};

function loadDemoBlocks() {
  blocks.push({id:'b_'+(nextId++), type:'site_main', name:'Site', icon:'🌐', desc:'Main website', category:'site', catColor:'#06b6d4', x:100, y:100, ports:{in:0,out:1}, config:{}, width:180, height:70});
  blocks.push({id:'b_'+(nextId++), type:'site_menu', name:'Menu', icon:'☰', desc:'Navigation', category:'site', catColor:'#06b6d4', x:100, y:200, ports:{in:1,out:1}, config:{items:'Home,About,Contact'}, width:180, height:70});
  connections.push({from:blocks[0].id, fromPort:0, to:blocks[1].id, toPort:0});
  renderBlocks();
}

// ==================== БЛОКИ ====================
function renderBlockList() {
  const list = document.getElementById('blockList');
  list.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const hdr = document.createElement('div');
    hdr.className = 'category-header';
    hdr.innerHTML = `<span>${cat.icon} ${cat.name} (${cat.blocks.length})</span><span class="arrow">▼</span>`;
    hdr.onclick = () => { hdr.classList.toggle('collapsed'); items.classList.toggle('hidden'); };
    list.appendChild(hdr);
    const items = document.createElement('div');
    items.className = 'category-items';
    cat.blocks.forEach(b => {
      const item = document.createElement('div');
      item.className = 'block-item';
      item.draggable = true;
      item.innerHTML = `<div class="icon" style="background:${cat.color}22;color:${cat.color}">${b.icon}</div><span class="name">${b.name}</span>`;
      item.addEventListener('dragstart', e => e.dataTransfer.setData('block', JSON.stringify({...b, category:cat.id, catColor:cat.color})));
      item.addEventListener('dblclick', () => addBlockToCanvas({...b, category:cat.id, catColor:cat.color}, 300 + Math.random()*100 - pan.x/zoom, 200 + Math.random()*100 - pan.y/zoom));
      items.appendChild(item);
    });
    list.appendChild(items);
  });
}

function addBlockToCanvas(def, x, y) {
  saveState();
  const block = {
    id: 'b_' + (nextId++), type: def.id, name: def.name, icon: def.icon, desc: def.desc,
    category: def.category, catColor: def.catColor, x: Math.round(x/12)*12, y: Math.round(y/12)*12,
    ports: def.ports, config: {}, width: 180, height: 70
  };
  blocks.push(block);
  renderBlocks();
  updateStats();
  toast(`Added ${block.name}`, 'success');
  return block;
}

function renderBlocks() {
  const container = document.getElementById('canvasBlocks');
  container.innerHTML = '';
  blocks.forEach(b => {
    const el = document.createElement('div');
    el.className = 'block' + (selectedBlocks.has(b.id) ? ' selected' : '');
    el.dataset.id = b.id;
    el.style.left = b.x + 'px';
    el.style.top = b.y + 'px';
    el.style.width = b.width + 'px';
    el.innerHTML = `<div class="block-header" style="background:${b.catColor}11"><div class="icon" style="background:${b.catColor}22;color:${b.catColor}">${b.icon}</div><span class="title">${b.name}</span><span class="delete" onclick="event.stopPropagation();deleteBlock('${b.id}')">✕</span></div><div class="block-body">${b.desc}</div>`;
    for(let i=0; i<b.ports.in; i++) { let p=document.createElement('div'); p.className='port input'; p.style.top=(30+i*20)+'px'; p.addEventListener('mousedown',e=>{e.stopPropagation();startConnection(b.id,'input',i,e);}); el.appendChild(p); }
    for(let i=0; i<b.ports.out; i++) { let p=document.createElement('div'); p.className='port output'; p.style.top=(30+i*20)+'px'; p.addEventListener('mousedown',e=>{e.stopPropagation();startConnection(b.id,'output',i,e);}); el.appendChild(p); }
    el.addEventListener('mousedown', e => {
      if(e.target.classList.contains('port')) return;
      e.stopPropagation();
      if(!e.shiftKey && !selectedBlocks.has(b.id)) clearSelection();
      selectedBlocks.add(b.id);
      dragBlock = b.id;
      const rect = el.getBoundingClientRect(), cr = document.getElementById('canvasContainer').getBoundingClientRect();
      dragOffset = { x: (e.clientX - cr.left - pan.x)/zoom - b.x, y: (e.clientY - cr.top - pan.y)/zoom - b.y };
      renderBlocks();
      updateProps();
    });
    container.appendChild(el);
  });
  renderConnections();
  updateMinimap();
}

function deleteBlock(id) {
  saveState();
  blocks = blocks.filter(b => b.id !== id);
  connections = connections.filter(c => c.from !== id && c.to !== id);
  selectedBlocks.delete(id);
  renderBlocks();
  updateStats();
  toast('Block deleted', 'info');
}

function clearSelection() { selectedBlocks.clear(); renderBlocks(); }

// ==================== СОЕДИНЕНИЯ ====================
function startConnection(blockId, portType, portIndex, e) {
  const block = blocks.find(b => b.id === blockId);
  if(!block) return;
  let sx = portType === 'output' ? block.x + block.width : block.x;
  let sy = block.y + 30 + portIndex * 20;
  connecting = { blockId, portType, portIndex, startX: sx, startY: sy };
}

function finishConnection(e) {
  if(!connecting) return;
  const rect = document.getElementById('canvasContainer').getBoundingClientRect();
  const mx = (e.clientX - rect.left - pan.x)/zoom;
  const my = (e.clientY - rect.top - pan.y)/zoom;
  let best = null, bestDist = 30;
  blocks.forEach(b => {
    if(b.id === connecting.blockId) return;
    const targetType = connecting.portType === 'output' ? 'input' : 'output';
    const count = targetType === 'input' ? b.ports.in : b.ports.out;
    for(let i=0; i<count; i++) {
      const px = targetType === 'input' ? b.x : b.x + b.width;
      const py = b.y + 30 + i*20;
      const d = Math.hypot(mx-px, my-py);
      if(d < bestDist) { bestDist = d; best = {blockId:b.id, portType:targetType, portIndex:i}; }
    }
  });
  if(best) {
    saveState();
    const conn = connecting.portType === 'output' ? {from:connecting.blockId, fromPort:connecting.portIndex, to:best.blockId, toPort:best.portIndex} : {from:best.blockId, fromPort:best.portIndex, to:connecting.blockId, toPort:connecting.portIndex};
    if(!connections.find(c => c.from===conn.from && c.fromPort===conn.fromPort && c.to===conn.to && c.toPort===conn.toPort)) {
      connections.push(conn);
      renderConnections();
      updateStats();
      toast('Connected', 'success');
    }
  }
  connecting = null;
  removeTempConnection();
}

function renderConnections() {
  const svg = document.getElementById('mainSvg');
  svg.innerHTML = '';
  connections.forEach(conn => {
    const fromBlock = blocks.find(b => b.id === conn.from);
    const toBlock = blocks.find(b => b.id === conn.to);
    if(!fromBlock || !toBlock) return;
    const x1 = fromBlock.x + fromBlock.width, y1 = fromBlock.y + 30 + conn.fromPort*20;
    const x2 = toBlock.x, y2 = toBlock.y + 30 + conn.toPort*20;
    const dx = Math.abs(x2-x1)*0.5;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`);
    path.setAttribute('stroke', 'var(--accent)');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.6');
    svg.appendChild(path);
  });
}

function removeTempConnection() {
  const temp = document.getElementById('mainSvg').querySelector('.temp-conn');
  if(temp) temp.remove();
}

// ==================== УПРАВЛЕНИЕ ХОЛСТОМ ====================
function setupCanvasEvents() {
  const container = document.getElementById('canvasContainer');
  container.addEventListener('dragover', e => e.preventDefault());
  container.addEventListener('drop', e => {
    e.preventDefault();
    const data = e.dataTransfer.getData('block');
    if(!data) return;
    const def = JSON.parse(data);
    const rect = container.getBoundingClientRect();
    const x = (e.clientX - rect.left - pan.x)/zoom;
    const y = (e.clientY - rect.top - pan.y)/zoom;
    addBlockToCanvas(def, x, y);
  });
  container.addEventListener('mousedown', e => {
    if(e.target === container || e.target.id === 'canvasBg') {
      if(e.button === 1 || e.shiftKey) {
        isPanning = true;
        panStart = {x: e.clientX - pan.x, y: e.clientY - pan.y};
        container.classList.add('panning');
      } else if(e.button === 0) clearSelection();
    }
  });
  container.addEventListener('mousemove', e => {
    const rect = container.getBoundingClientRect();
    document.getElementById('cursorPos').textContent = `${Math.round((e.clientX - rect.left - pan.x)/zoom)}, ${Math.round((e.clientY - rect.top - pan.y)/zoom)}`;
    if(isPanning) { pan.x = e.clientX - panStart.x; pan.y = e.clientY - panStart.y; updateCanvasTransform(); }
    if(connecting) updateTempConnection(e.clientX - rect.left, e.clientY - rect.top);
    if(dragBlock) {
      const x = (e.clientX - rect.left - pan.x)/zoom - dragOffset.x;
      const y = (e.clientY - rect.top - pan.y)/zoom - dragOffset.y;
      const block = blocks.find(b => b.id === dragBlock);
      if(block) { block.x = Math.round(x/12)*12; block.y = Math.round(y/12)*12; renderBlocks(); }
    }
  });
  container.addEventListener('mouseup', e => {
    if(isPanning) { isPanning = false; container.classList.remove('panning'); }
    if(connecting) { finishConnection(e); connecting = null; }
    if(dragBlock) { saveState(); dragBlock = null; }
  });
  container.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const oldZoom = zoom;
    zoom *= e.deltaY < 0 ? 1.1 : 0.9;
    zoom = Math.max(0.2, Math.min(3, zoom));
    pan.x = mx - (mx - pan.x) * (zoom/oldZoom);
    pan.y = my - (my - pan.y) * (zoom/oldZoom);
    updateCanvasTransform();
    document.getElementById('zoomLevel').textContent = Math.round(zoom*100)+'%';
  }, {passive:false});
}

function updateCanvasTransform() {
  const t = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
  document.getElementById('canvasBlocks').style.transform = t;
  document.getElementById('canvasBlocks').style.transformOrigin = '0 0';
  document.getElementById('mainSvg').style.transform = t;
  document.getElementById('mainSvg').style.transformOrigin = '0 0';
  document.getElementById('canvasBg').style.backgroundSize = `${24*zoom}px ${24*zoom}px`;
  document.getElementById('canvasBg').style.backgroundPosition = `${pan.x}px ${pan.y}px`;
  updateMinimap();
}

function updateTempConnection(mx, my) {
  const svg = document.getElementById('mainSvg');
  let temp = svg.querySelector('.temp-conn');
  if(!temp) { temp = document.createElementNS('http://www.w3.org/2000/svg', 'path'); temp.classList.add('temp-conn'); temp.setAttribute('stroke', 'var(--accent)'); temp.setAttribute('stroke-dasharray', '6,4'); temp.setAttribute('fill', 'none'); svg.appendChild(temp); }
  const ex = (mx - pan.x)/zoom, ey = (my - pan.y)/zoom;
  const dx = Math.abs(ex - connecting.startX)*0.5;
  temp.setAttribute('d', `M${connecting.startX},${connecting.startY} C${connecting.startX+dx},${connecting.startY} ${ex-dx},${ey} ${ex},${ey}`);
}

function zoomIn() { zoom = Math.min(3, zoom*1.2); updateCanvasTransform(); document.getElementById('zoomLevel').textContent = Math.round(zoom*100)+'%'; }
function zoomOut() { zoom = Math.max(0.2, zoom/1.2); updateCanvasTransform(); document.getElementById('zoomLevel').textContent = Math.round(zoom*100)+'%'; }
function zoomReset() { zoom = 1; pan = {x:0, y:0}; updateCanvasTransform(); document.getElementById('zoomLevel').textContent = '100%'; }
function panLeft() { pan.x += 50; updateCanvasTransform(); }
function panRight() { pan.x -= 50; updateCanvasTransform(); }
function panUp() { pan.y += 50; updateCanvasTransform(); }
function panDown() { pan.y -= 50; updateCanvasTransform(); }
function centerAll() {
  if(blocks.length === 0) return;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  blocks.forEach(b => { minX = Math.min(minX, b.x); minY = Math.min(minY, b.y); maxX = Math.max(maxX, b.x+b.width); maxY = Math.max(maxY, b.y+b.height); });
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
  const rect = document.getElementById('canvasContainer').getBoundingClientRect();
  pan.x = rect.width/2 - cx*zoom;
  pan.y = rect.height/2 - cy*zoom;
  updateCanvasTransform();
}

// ==================== ЗАПУСК ВОРКФЛОУ ====================
function runWorkflow() {
  if(blocks.length === 0) { toast('Add blocks first', 'error'); return; }
  const firstBlock = blocks.find(b => b.type === 'call') || blocks[0];
  if(firstBlock.type === 'call') makeCall(firstBlock);
  else if(firstBlock.type === 'site_main') generateSite();
  else if(firstBlock.type === 'chatbot') startChat();
  else toast('Workflow started!', 'info');
  log('Workflow executed');
}

async function makeCall(block) {
  const phone = block.config.phone || prompt('Enter phone number (+7...):');
  const text = block.config.message || prompt('Message to speak:');
  if(!phone || !text) { toast('Phone and message required', 'error'); return; }
  toast('Calling...', 'info');
  try {
    const res = await fetch('https://api.inout.bot/call', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ phone, message: text, apikey: block.config.apiKey || 'YOUR_KEY' })
    });
    if(res.ok) toast('Call initiated!', 'success');
    else toast('Call failed', 'error');
  } catch(e) { toast('API error: ' + e.message, 'error'); }
}

function generateSite() {
  const siteBlock = blocks.find(b => b.type === 'site_main');
  if(!siteBlock) return;
  const title = siteBlock.config.title || 'My Site';
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>body{font-family:sans-serif;margin:0;padding:0}</style></head><body>`;
  blocks.forEach(b => {
    if(b.type === 'site_menu') html += `<nav style="background:#333;color:#fff;padding:10px;">${b.config.items || 'Home | About'}</nav>`;
    if(b.type === 'site_section') html += `<section style="padding:20px"><h2>${b.config.heading || 'Section'}</h2><p>${b.config.content || 'Content here'}</p></section>`;
    if(b.type === 'site_footer') html += `<footer style="background:#eee;padding:10px;text-align:center">${b.config.text || '© 2026'}</footer>`;
  });
  html += '</body></html>';
  const win = window.open();
  win.document.write(html);
  win.document.close();
  toast('Site generated!', 'success');
}

function startChat() {
  const chatWin = window.open();
  chatWin.document.write('<div style="display:flex;flex-direction:column;height:100vh"><div id="messages" style="flex:1;overflow:auto;padding:10px"></div><div style="display:flex"><input id="msg" style="flex:1" placeholder="Type..."><button onclick="send()">Send</button></div></div><script>function send(){const msg=document.getElementById("msg").value;if(!msg)return;const msgs=document.getElementById("messages");msgs.innerHTML+=\'<div style="background:#eee;margin:5px;padding:8px;border-radius:8px">You: \'+msg+\'</div>\';document.getElementById("msg").value="";fetch("/api/chat",{method:"POST",body:JSON.stringify({message:msg})}).then(r=>r.json()).then(d=>{msgs.innerHTML+=\'<div style="background:#d0f0ff;margin:5px;padding:8px;border-radius:8px">Bot: \'+d.reply+\'</div>\';msgs.scrollTop=msgs.scrollHeight;});}<\/script>');
  toast('Chat started', 'success');
}

// ==================== AI АССИСТЕНТ ====================
function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';
  addChatMsg(msg, 'user');
  processAI(msg);
}
function addChatMsg(text, role) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}
async function processAI(msg) {
  const lower = msg.toLowerCase();
  if(lower.includes('call') || lower.includes('звонок')) {
    addChatMsg('📞 I can help you set up a voice call block. Add the "Voice Call" block from the left panel and configure phone number and message.', 'ai');
    return;
  }
  if(lower.includes('email')) {
    addChatMsg('📧 Let me create an email workflow for you...', 'ai');
    saveState();
    addBlockToCanvas(CATEGORIES.find(c=>c.id==='msg').blocks.find(b=>b.id==='email_send'), 200, 150);
    return;
  }
  addChatMsg('Try adding blocks from the left panel, or describe what you want (e.g., "call to phone", "email automation", "website").', 'ai');
}
function aiSuggest(text) { addChatMsg(text, 'user'); processAI(text); }

// ==================== ИНТЕРФЕЙС ====================
function updateProps() {
  const noSel = document.getElementById('noSelection');
  const content = document.getElementById('propsContent');
  if(selectedBlocks.size === 0) { noSel.style.display = ''; content.style.display = 'none'; return; }
  noSel.style.display = 'none'; content.style.display = '';
  const block = blocks.find(b => b.id === [...selectedBlocks][0]);
  if(!block) return;
  content.innerHTML = `<div class="prop-group"><label>Name</label><input value="${block.name}" onchange="blocks.find(b=>b.id==='${block.id}').name=this.value;renderBlocks()"></div>
    <div class="prop-group"><label>Description</label><textarea onchange="blocks.find(b=>b.id==='${block.id}').desc=this.value">${block.desc}</textarea></div>
    ${block.type==='call' ? `<div class="prop-group"><label>Phone (+7...)</label><input placeholder="+71234567890" value="${block.config.phone||''}" onchange="blocks.find(b=>b.id==='${block.id}').config.phone=this.value"></div>
    <div class="prop-group"><label>Message</label><textarea placeholder="Text to speak" onchange="blocks.find(b=>b.id==='${block.id}').config.message=this.value">${block.config.message||''}</textarea></div>
    <div class="prop-group"><label>InOut.bot API Key</label><input placeholder="Your API key" value="${block.config.apiKey||''}" onchange="blocks.find(b=>b.id==='${block.id}').config.apiKey=this.value"></div>` : ''}
    ${block.type==='site_menu' ? `<div class="prop-group"><label>Menu items (comma)</label><input value="${block.config.items||'Home,About,Contact'}" onchange="blocks.find(b=>b.id==='${block.id}').config.items=this.value"></div>` : ''}
    ${block.type==='site_section' ? `<div class="prop-group"><label>Heading</label><input value="${block.config.heading||'Section'}" onchange="blocks.find(b=>b.id==='${block.id}').config.heading=this.value"></div>
    <div class="prop-group"><label>Content</label><textarea onchange="blocks.find(b=>b.id==='${block.id}').config.content=this.value">${block.config.content||''}</textarea></div>` : ''}
    ${block.type==='site_footer' ? `<div class="prop-group"><label>Footer text</label><input value="${block.config.text||'© 2026'}" onchange="blocks.find(b=>b.id==='${block.id}').config.text=this.value"></div>` : ''}`;
}
function switchTab(tab) {
  document.querySelectorAll('.sidebar-tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('tabProps').classList.add('hidden');
  document.getElementById('tabAI').classList.add('hidden');
  if(tab === 'props') { document.querySelector('.sidebar-tabs button:first-child').classList.add('active'); document.getElementById('tabProps').classList.remove('hidden'); }
  else { document.querySelector('.sidebar-tabs button:last-child').classList.add('active'); document.getElementById('tabAI').classList.remove('hidden'); }
}
function updateStats() { document.getElementById('blockCount').textContent = blocks.length + ' blocks'; document.getElementById('connCount').textContent = connections.length + ' connections'; }
function updateMinimap() {
  const canvas = document.getElementById('minimapCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 160; canvas.height = 100;
  ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,160,100);
  if(blocks.length===0) return;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  blocks.forEach(b => { minX = Math.min(minX, b.x); minY = Math.min(minY, b.y); maxX = Math.max(maxX, b.x+b.width); maxY = Math.max(maxY, b.y+b.height); });
  const pad = 50, w = maxX-minX+pad*2||1, h = maxY-minY+pad*2||1;
  const scale = Math.min(160/w, 100/h);
  const ox = (160 - w*scale)/2, oy = (100 - h*scale)/2;
  connections.forEach(c => {
    const from = blocks.find(b=>b.id===c.from), to = blocks.find(b=>b.id===c.to);
    if(!from||!to) return;
    ctx.beginPath(); ctx.moveTo(ox+(from.x+from.width-minX+pad)*scale, oy+(from.y+35-minY+pad)*scale);
    ctx.lineTo(ox+(to.x-minX+pad)*scale, oy+(to.y+35-minY+pad)*scale);
    ctx.strokeStyle = '#6366f144'; ctx.lineWidth = 1; ctx.stroke();
  });
  blocks.forEach(b => { ctx.fillStyle = selectedBlocks.has(b.id) ? '#6366f1' : '#2a2a4a'; ctx.fillRect(ox+(b.x-minX+pad)*scale, oy+(b.y-minY+pad)*scale, b.width*scale, b.height*scale); });
}
function saveState() { undoStack.push(JSON.stringify({blocks,connections,nextId})); if(undoStack.length>50) undoStack.shift(); redoStack=[]; }
function undo() { if(!undoStack.length) return; redoStack.push(JSON.stringify({blocks,connections,nextId})); const s=JSON.parse(undoStack.pop()); blocks=s.blocks; connections=s.connections; nextId=s.nextId; selectedBlocks.clear(); renderBlocks(); updateStats(); toast('Undo','info'); }
function redo() { if(!redoStack.length) return; undoStack.push(JSON.stringify({blocks,connections,nextId})); const s=JSON.parse(redoStack.pop()); blocks=s.blocks; connections=s.connections; nextId=s.nextId; selectedBlocks.clear(); renderBlocks(); updateStats(); toast('Redo','info'); }
function saveProject() { localStorage.setItem('flowbuilder', JSON.stringify({name:document.getElementById('projectName').value, blocks, connections, nextId})); toast('Saved','success'); }
function loadProject() { const d=localStorage.getItem('flowbuilder'); if(d) { const p=JSON.parse(d); blocks=p.blocks; connections=p.connections; nextId=p.nextId; document.getElementById('projectName').value=p.name; renderBlocks(); updateStats(); toast('Loaded','success'); } else toast('No save','error'); }
function exportJSON() { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify({blocks,connections,nextId})])); a.download='flow.json'; a.click(); toast('Exported','success'); }
function filterBlocks() { const q=document.getElementById('blockSearch').value.toLowerCase(); document.querySelectorAll('.category-items').forEach(i=>{i.querySelectorAll('.block-item').forEach(b=>{b.style.display=b.querySelector('.name').textContent.toLowerCase().includes(q)?'': 'none';});}); }
function toast(msg,type) { const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),2500); }
function log(msg) { document.getElementById('logOutput').textContent=msg; }
</script>
