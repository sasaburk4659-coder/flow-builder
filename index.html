<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>FlowBuilder AI</title><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a2e;--surface3:#232340;--border:#2a2a4a;--text:#e0e0ff;--text2:#8888aa;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--orange:#f59e0b}html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}.topbar{height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100}.topbar .logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.topbar .project-name{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);font-size:13px;outline:none;width:180px}.topbar button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}.topbar button.primary{background:var(--accent);border-color:var(--accent);color:#fff}.topbar .spacer{flex:1}.topbar .stats{font-size:11px;color:var(--text2);display:flex;gap:12px}.main{display:flex;height:calc(100vh - 48px - 32px)}.sidebar-left{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}.sidebar-left .search-box{padding:8px;border-bottom:1px solid var(--border);position:relative}.sidebar-left .search-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px 7px 30px;color:var(--text);font-size:12px;outline:none}.sidebar-left .search-box::before{content:'🔍';position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:12px}.block-list{flex:1;overflow-y:auto;padding:4px 0}.category-header{padding:6px 12px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:flex;justify-content:space-between}.category-header .arrow{transition:transform .2s}.category-header.collapsed .arrow{transform:rotate(-90deg)}.category-items{padding:0 6px 4px}.category-items.hidden{display:none}.block-item{padding:6px 8px;border-radius:6px;font-size:12px;cursor:grab;display:flex;align-items:center;gap:8px;border:1px solid transparent;margin:1px 0}.block-item:hover{background:var(--surface2);border-color:var(--border)}.block-item .icon{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px}.block-item .name{flex:1}.canvas-container{flex:1;position:relative;overflow:hidden;background:var(--bg)}.canvas-bg{position:absolute;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:24px 24px;opacity:.4}svg#mainSvg{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}.canvas-blocks{position:absolute;inset:0;pointer-events:none}.block{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:160px;cursor:move;pointer-events:all}.block.selected{border-color:var(--accent);box-shadow:0 0 25px rgba(99,102,241,.3)}.block-header{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}.block-header .icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center}.block-header .title{flex:1}.block-header .delete{opacity:0;cursor:pointer;font-size:14px;color:var(--red)}.block:hover .block-header .delete{opacity:.7}.block-body{padding:8px 10px;font-size:11px;color:var(--text2)}.port{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--surface);position:absolute;cursor:crosshair;z-index:5}.port:hover{transform:scale(1.4);border-color:var(--accent);background:var(--accent)}.port.input{left:-6px}.port.output{right:-6px}.sidebar-right{width:320px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}.sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}.sidebar-tabs button{flex:1;padding:10px;background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;border-bottom:2px solid transparent}.sidebar-tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}.tab-content{flex:1;overflow-y:auto;padding:12px}.tab-content.hidden{display:none}.prop-group{margin-bottom:12px}.prop-group label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px}.prop-group input,.prop-group select,.prop-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;outline:none}.no-selection{text-align:center;color:var(--text2);padding:40px 20px}.chat-messages{flex:1;overflow-y:auto;padding:8px}.chat-msg{padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:12px;max-width:90%}.chat-msg.user{background:var(--accent);color:#fff;margin-left:auto}.chat-msg.ai{background:var(--surface2);color:var(--text)}.chat-input-area{display:flex;gap:6px;padding:8px;border-top:1px solid var(--border);background:var(--surface)}.chat-input-area input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:12px}.chat-input-area button{background:var(--accent);border:none;color:#fff;padding:8px 12px;border-radius:6px;cursor:pointer}.model-selector{position:relative}.model-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;font-size:12px}.model-dropdown{display:none;position:absolute;bottom:100%;left:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;z-index:200;min-width:180px}.model-dropdown.show{display:block}.model-item{padding:8px 12px;cursor:pointer;font-size:12px}.model-item:hover{background:var(--surface2)}.model-item.active{color:var(--accent)}.connector-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:8px}.connector-card .info{flex:1}.connector-card .name{font-weight:600;font-size:12px}.connector-card .desc{font-size:10px;color:var(--text2)}.connector-card .status{font-size:10px;padding:2px 6px;border-radius:10px}.connector-card .status.on{background:rgba(34,197,94,.2);color:var(--green)}.connector-card .status.off{background:rgba(239,68,68,.2);color:var(--red)}.connector-card button{background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:10px;cursor:pointer}.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000}.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:320px}.modal-content input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;margin:10px 0;color:var(--text)}.modal-content button{margin-top:10px;padding:8px 12px;background:var(--accent);border:none;border-radius:6px;color:#fff;cursor:pointer}.bottombar{height:32px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--text2)}.toast-container{position:fixed;top:60px;right:16px;z-index:3000}.toast{padding:10px 16px;border-radius:8px;font-size:12px;margin-bottom:8px}.toast.success{background:var(--green);color:#fff}.toast.error{background:var(--red);color:#fff}</style></head><body>
<div class="topbar"><div class="logo">⚡ FlowBuilder AI</div><input class="project-name" id="projectName" value="My Workflow"><div class="sep"></div><button onclick="undo()">↩ Undo</button><button onclick="redo()">↪ Redo</button><div class="sep"></div><button onclick="saveProject()">💾 Save</button><div class="spacer"></div><div class="stats"><span id="blockCount">0 blocks</span><span id="connCount">0 connections</span></div><button class="primary" onclick="runWorkflow()">▶ Run</button></div>
<div class="main"><div class="sidebar-left"><div class="search-box"><input placeholder="Search blocks..." id="blockSearch" oninput="filterBlocks()"></div><div class="block-list" id="blockList"></div></div>
<div class="canvas-container" id="canvasContainer"><div class="canvas-bg" id="canvasBg"></div><svg id="mainSvg"></svg><div class="canvas-blocks" id="canvasBlocks"></div></div>
<div class="sidebar-right"><div class="sidebar-tabs"><button class="active" onclick="switchTab('props')">📋 Properties</button><button onclick="switchTab('ai')">🤖 AI</button></div>
<div class="tab-content" id="tabProps"><div class="no-selection" id="noSelection">Select a block</div><div id="propsContent" style="display:none"></div></div>
<div class="tab-content hidden" id="tabAI"><div style="margin-bottom:12px;padding:8px;background:var(--surface2);border-radius:8px"><div style="font-size:11px;color:var(--text2);margin-bottom:6px">🤖 Подключённые модели</div><div id="connectorsList"></div></div>
<div class="chat-messages" id="chatMessages"><div class="chat-msg ai">👋 Опишите что построить.<div class="suggestion-chips" style="margin-top:6px"><span style="background:var(--surface3);padding:2px 8px;border-radius:12px;display:inline-block;margin-right:4px;cursor:pointer" onclick="aiSuggest('Сделай email рассылку')">📧 Email</span><span style="background:var(--surface3);padding:2px 8px;border-radius:12px;cursor:pointer" onclick="aiSuggest('Сделай звонок')">📞 Call</span></div></div></div>
<div class="chat-input-area"><div class="model-selector"><button class="model-btn" id="modelBtn" onclick="toggleModelDropdown()">🤖 HuggingFace</button><div class="model-dropdown" id="modelDropdown"></div></div><input id="chatInput" placeholder="Опишите..." onkeydown="if(event.key==='Enter')sendChat()"><button onclick="sendChat()">Send</button></div></div></div></div>
<div class="bottombar"><span>⚡ FlowBuilder AI</span><span style="margin-left:auto" id="logOutput">Ready</span></div>
<div id="toastContainer" class="toast-container"></div>
<script>
const CATEGORIES=[{id:'msg',name:'Сообщения',color:'#22c55e',icon:'💬',blocks:[{id:'email_send',name:'Отправить Email',icon:'📧',desc:'Отправляет письмо',ports:{in:1,out:1},fields:[{name:'to',label:'Кому',type:'text'},{name:'subject',label:'Тема',type:'text'},{name:'body',label:'Текст',type:'textarea'}]},{id:'call',name:'Звонок',icon:'📞',desc:'Позвонить',ports:{in:1,out:1},fields:[{name:'phone',label:'Номер +7...',type:'text'},{name:'message',label:'Текст',type:'textarea'}]}]},{id:'logic',name:'Логика',color:'#f97316',icon:'⚡',blocks:[{id:'if_else',name:'Если/Иначе',icon:'🔀',desc:'Разветвление',ports:{in:1,out:2},fields:[{name:'condition',label:'Условие',type:'text'}]},{id:'delay',name:'Задержка',icon:'⏱️',desc:'Пауза',ports:{in:1,out:1},fields:[{name:'ms',label:'Мс',type:'number'}]}]},{id:'api',name:'API',color:'#f59e0b',icon:'🌐',blocks:[{id:'http_req',name:'HTTP Запрос',icon:'📡',desc:'Запрос',ports:{in:1,out:1},fields:[{name:'url',label:'URL',type:'text'}]}]}];
const CONNECTORS=[{id:'hf',name:'HuggingFace',icon:'🤗',group:'free',desc:'Бесплатно',url:'https://huggingface.co',connected:true,apiKey:'',test:async()=>true},{id:'groq',name:'Groq',icon:'⚡',group:'free',desc:'Бесплатный tier',url:'https://console.groq.com/keys',connected:false,apiKey:'',test:async(k)=>{try{const r=await fetch('https://api.groq.com/openai/v1/models',{headers:{'Authorization':'Bearer '+k}});return r.ok;}catch{return false;}}},{id:'openai',name:'OpenAI',icon:'🟢',group:'paid',desc:'GPT-4',url:'https://platform.openai.com/api-keys',connected:false,apiKey:'',test:async(k)=>{try{const r=await fetch('https://api.openai.com/v1/models',{headers:{'Authorization':'Bearer '+k}});return r.ok;}catch{return false;}}}];
let selectedModel='hf';let blocks=[],connections=[],selectedBlocks=new Set();let dragBlock=null,dragOffset={x:0,y:0},pan={x:0,y:0},zoom=1,isPanning=0,panStart={x:0,y:0},connecting=null;let undoStack=[],redoStack=[],nextId=1;
function loadConnectors(){try{const d=JSON.parse(localStorage.getItem('fb_connectors')||'null');if(d){d.forEach(s=>{const c=CONNECTORS.find(x=>x.id===s.id);if(c){c.connected=s.connected;c.apiKey=s.apiKey||'';}});}}catch{}const sel=localStorage.getItem('fb_selectedModel');if(sel)selectedModel=sel;}function saveConnectors(){localStorage.setItem('fb_connectors',JSON.stringify(CONNECTORS.map(c=>({id:c.id,connected:c.connected,apiKey:c.apiKey||''}))));localStorage.setItem('fb_selectedModel',selectedModel);}loadConnectors();
function renderConnectorsList(){const d=document.getElementById('connectorsList');if(!d)return;d.innerHTML=CONNECTORS.map(c=>`<div class="connector-card"><div class="icon">${c.icon}</div><div class="info"><div class="name">${c.name}</div><div class="desc">${c.desc}</div></div><div class="status ${c.connected?'on':'off'}">${c.connected?'✓':'✗'}</div>${c.connected?`<button onclick="disconnectConn('${c.id}')">Откл</button>`:`<button onclick="openConnModal('${c.id}')">Connect</button>`}</div>`).join('');}
function renderModelDropdown(){const dd=document.getElementById('modelDropdown');if(!dd)return;const connected=CONNECTORS.filter(c=>c.connected);dd.innerHTML=connected.map(c=>`<div class="model-item ${selectedModel===c.id?'active':''}" onclick="selectModel('${c.id}')">${c.icon} ${c.name}</div>`).join('');}
function toggleModelDropdown(){const dd=document.getElementById('modelDropdown');dd.classList.toggle('show');renderModelDropdown();}
function selectModel(id){selectedModel=id;saveConnectors();const c=CONNECTORS.find(x=>x.id===id);document.getElementById('modelBtn').textContent=`🤖 ${c.name}`;document.getElementById('modelDropdown').classList.remove('show');toast(`Модель: ${c.name}`,'success');}
function disconnectConn(id){const c=CONNECTORS.find(x=>x.id===id);if(c){c.connected=false;c.apiKey='';saveConnectors();renderConnectorsList();renderModelDropdown();toast(`${c.name} отключен`,'info');}}
function openConnModal(id){const c=CONNECTORS.find(x=>x.id===id);if(!c)return;const ov=document.createElement('div');ov.className='modal';ov.innerHTML=`<div class="modal-content"><h3>🔌 ${c.name}</h3><p>Введите API ключ</p><input id="connKey" type="password" placeholder="sk-..."><div id="connTest"></div><button onclick="testAndSave('${id}')">Проверить и сохранить</button><button onclick="closeModal()">Отмена</button></div>`;document.body.appendChild(ov);}
async function testAndSave(id){const c=CONNECTORS.find(x=>x.id===id);const key=document.getElementById('connKey').value.trim();const testDiv=document.getElementById('connTest');testDiv.innerHTML='⏳ Проверка...';try{const ok=await c.test(key);if(ok){c.apiKey=key;c.connected=true;saveConnectors();renderConnectorsList();renderModelDropdown();closeModal();toast(`${c.name} подключен`,'success');}else{testDiv.innerHTML='❌ Неверный ключ';}}catch(e){testDiv.innerHTML='❌ Ошибка';}}
function closeModal(){const m=document.querySelector('.modal');if(m)m.remove();}
function toast(msg,type){const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),2500);}
function renderBlockList(){const list=document.getElementById('blockList');list.innerHTML='';CATEGORIES.forEach(cat=>{const hdr=document.createElement('div');hdr.className='category-header';hdr.innerHTML=`<span>${cat.icon} ${cat.name}</span><span class="arrow">▼</span>`;hdr.onclick=()=>{hdr.classList.toggle('collapsed');items.classList.toggle('hidden');};list.appendChild(hdr);const items=document.createElement('div');items.className='category-items';cat.blocks.forEach(b=>{const it=document.createElement('div');it.className='block-item';it.draggable=true;it.innerHTML=`<div class="icon" style="background:${cat.color}22;color:${cat.color}">${b.icon}</div><span class="name">${b.name}</span>`;it.addEventListener('dragstart',e=>e.dataTransfer.setData('block',JSON.stringify({...b,category:cat.id,catColor:cat.color})));items.appendChild(it);});list.appendChild(items);});}
function addBlockToCanvas(def,x,y){saveState();const block={id:'b_'+(nextId++),type:def.id,name:def.name,icon:def.icon,desc:def.desc,category:def.category,catColor:def.catColor,x:Math.round(x/12)*12,y:Math.round(y/12)*12,ports:def.ports,config:{},width:180,height:70};blocks.push(block);renderBlocks();updateStats();toast(`Added ${block.name}`,'success');}
function renderBlocks(){const cont=document.getElementById('canvasBlocks');cont.innerHTML='';blocks.forEach(b=>{const el=document.createElement('div');el.className='block'+(selectedBlocks.has(b.id)?' selected':'');el.dataset.id=b.id;el.style.left=b.x+'px';el.style.top=b.y+'px';el.style.width=b.width+'px';el.innerHTML=`<div class="block-header"><div class="icon" style="background:${b.catColor}22;color:${b.catColor}">${b.icon}</div><span class="title">${b.name}</span><span class="delete" onclick="event.stopPropagation();deleteBlock('${b.id}')">✕</span></div><div class="block-body">${b.desc}</div>`;for(let i=0;i<b.ports.in;i++){let p=document.createElement('div');p.className='port input';p.style.top=(30+i*20)+'px';p.addEventListener('mousedown',e=>{e.stopPropagation();startConnection(b.id,'input',i,e);});el.appendChild(p);}for(let i=0;i<b.ports.out;i++){let p=document.createElement('div');p.className='port output';p.style.top=(30+i*20)+'px';p.addEventListener('mousedown',e=>{e.stopPropagation();startConnection(b.id,'output',i,e);});el.appendChild(p);}el.addEventListener('mousedown',e=>{if(e.target.classList.contains('port')||e.target.classList.contains('delete'))return;e.stopPropagation();if(!e.shiftKey&&!selectedBlocks.has(b.id))clearSelection();selectedBlocks.add(b.id);dragBlock=b.id;const rect=el.getBoundingClientRect(),cr=document.getElementById('canvasContainer').getBoundingClientRect();dragOffset={x:(e.clientX-cr.left-pan.x)/zoom-b.x,y:(e.clientY-cr.top-pan.y)/zoom-b.y};renderBlocks();updateProps();});cont.appendChild(el);});renderConnections();updateMinimap();}
function deleteBlock(id){saveState();blocks=blocks.filter(b=>b.id!==id);connections=connections.filter(c=>c.from!==id&&c.to!==id);selectedBlocks.delete(id);renderBlocks();updateStats();toast('Deleted','info');}
function clearSelection(){selectedBlocks.clear();renderBlocks();}
function startConnection(blockId,portType,portIndex,e){const b=blocks.find(b=>b.id===blockId);if(!b)return;let sx=portType==='output'?b.x+b.width:b.x;let sy=b.y+30+portIndex*20;connecting={blockId,portType,portIndex,startX:sx,startY:sy};e.preventDefault();}
function finishConnection(e){if(!connecting)return;const rect=document.getElementById('canvasContainer').getBoundingClientRect();const mx=(e.clientX-rect.left-pan.x)/zoom;const my=(e.clientY-rect.top-pan.y)/zoom;let best=null,bestDist=30;blocks.forEach(b=>{if(b.id===connecting.blockId)return;const ttype=connecting.portType==='output'?'input':'output';const cnt=ttype==='input'?b.ports.in:b.ports.out;for(let i=0;i<cnt;i++){const px=ttype==='input'?b.x:b.x+b.width;const py=b.y+30+i*20;const d=Math.hypot(mx-px,my-py);if(d<bestDist){bestDist=d;best={blockId:b.id,portType:ttype,portIndex:i};}}});if(best){saveState();const conn=connecting.portType==='output'?{from:connecting.blockId,fromPort:connecting.portIndex,to:best.blockId,toPort:best.portIndex}:{from:best.blockId,fromPort:best.portIndex,to:connecting.blockId,toPort:connecting.portIndex};if(!connections.find(c=>c.from===conn.from&&c.fromPort===conn.fromPort&&c.to===conn.to&&c.toPort===conn.toPort)){connections.push(conn);renderConnections();updateStats();toast('Connected','success');}}connecting=null;removeTempConnection();}
function renderConnections(){const svg=document.getElementById('mainSvg');svg.innerHTML='';connections.forEach(conn=>{const fb=blocks.find(b=>b.id===conn.from);const tb=blocks.find(b=>b.id===conn.to);if(!fb||!tb)return;const x1=fb.x+fb.width,y1=fb.y+30+conn.fromPort*20;const x2=tb.x,y2=tb.y+30+conn.toPort*20;const dx=Math.abs(x2-x1)*0.5;const path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`);path.setAttribute('stroke','var(--accent)');path.setAttribute('stroke-width','2');path.setAttribute('fill','none');svg.appendChild(path);});}
function updateTempConnection(mx,my){const svg=document.getElementById('mainSvg');let temp=svg.querySelector('.temp-conn');if(!temp){temp=document.createElementNS('http://www.w3.org/2000/svg','path');temp.classList.add('temp-conn');temp.setAttribute('stroke','var(--accent)');temp.setAttribute('stroke-dasharray','6,4');temp.setAttribute('fill','none');svg.appendChild(temp);}if(!connecting)return;const ex=(mx-pan.x)/zoom,ey=(my-pan.y)/zoom;const dx=Math.abs(ex-connecting.startX)*0.5;temp.setAttribute('d',`M${connecting.startX},${connecting.startY} C${connecting.startX+dx},${connecting.startY} ${ex-dx},${ey} ${ex},${ey}`);}
function removeTempConnection(){const t=document.getElementById('mainSvg').querySelector('.temp-conn');if(t)t.remove();}
function setupCanvasEvents(){const c=document.getElementById('canvasContainer');c.addEventListener('dragover',e=>e.preventDefault());c.addEventListener('drop',e=>{e.preventDefault();const d=e.dataTransfer.getData('block');if(!d)return;const def=JSON.parse(d);const rect=c.getBoundingClientRect();const x=(e.clientX-rect.left-pan.x)/zoom;const y=(e.clientY-rect.top-pan.y)/zoom;addBlockToCanvas(def,x,y);});c.addEventListener('mousedown',e=>{if(e.target===c||e.target.id==='canvasBg'){if(e.button===1||e.shiftKey){isPanning=1;panStart={x:e.clientX-pan.x,y:e.clientY-pan.y};c.style.cursor='grabbing';}else if(e.button===0)clearSelection();}});c.addEventListener('mousemove',e=>{const rect=c.getBoundingClientRect();if(isPanning){pan.x=e.clientX-panStart.x;pan.y=e.clientY-panStart.y;updateCanvasTransform();}if(connecting)updateTempConnection(e.clientX-rect.left,e.clientY-rect.top);if(dragBlock){const x=(e.clientX-rect.left-pan.x)/zoom-dragOffset.x;const y=(e.clientY-rect.top-pan.y)/zoom-dragOffset.y;const bl=blocks.find(b=>b.id===dragBlock);if(bl){bl.x=Math.round(x/12)*12;bl.y=Math.round(y/12)*12;renderBlocks();}}});c.addEventListener('mouseup',e=>{if(isPanning){isPanning=0;c.style.cursor='';}if(connecting){finishConnection(e);connecting=null;}if(dragBlock){saveState();dragBlock=null;}});c.addEventListener('wheel',e=>{e.preventDefault();const rect=c.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;const old=zoom;zoom*=e.deltaY<0?1.1:0.9;zoom=Math.max(0.2,Math.min(3,zoom));pan.x=mx-(mx-pan.x)*(zoom/old);pan.y=my-(my-pan.y)*(zoom/old);updateCanvasTransform();},{passive:false});}
function updateCanvasTransform(){const t=`translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;document.getElementById('canvasBlocks').style.transform=t;document.getElementById('canvasBlocks').style.transformOrigin='0 0';document.getElementById('mainSvg').style.transform=t;document.getElementById('mainSvg').style.transformOrigin='0 0';document.getElementById('canvasBg').style.backgroundSize=`${24*zoom}px ${24*zoom}px`;document.getElementById('canvasBg').style.backgroundPosition=`${pan.x}px ${pan.y}px`;updateMinimap();}
function updateMinimap(){const cv=document.getElementById('minimapCanvas');if(!cv)return;cv.width=160;cv.height=100;const ctx=cv.getContext('2d');ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,160,100);if(!blocks.length)return;let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;blocks.forEach(b=>{minX=Math.min(minX,b.x);minY=Math.min(minY,b.y);maxX=Math.max(maxX,b.x+b.width);maxY=Math.max(maxY,b.y+b.height);});const pad=50,w=maxX-minX+pad*2||1,h=maxY-minY+pad*2||1,scale=Math.min(160/w,100/h),ox=(160-w*scale)/2,oy=(100-h*scale)/2;blocks.forEach(b=>{ctx.fillStyle=selectedBlocks.has(b.id)?'#6366f1':'#2a2a4a';ctx.fillRect(ox+(b.x-minX+pad)*scale,oy+(b.y-minY+pad)*scale,b.width*scale,b.height*scale);});}
function updateProps(){const no=document.getElementById('noSelection'),cont=document.getElementById('propsContent');if(selectedBlocks.size===0){no.style.display='';cont.style.display='none';return;}no.style.display='none';cont.style.display='';const b=blocks.find(b=>b.id===[...selectedBlocks][0]);if(!b)return;cont.innerHTML=`<div class="prop-group"><label>Название</label><input value="${b.name}" onchange="blocks.find(x=>x.id==='${b.id}').name=this.value;renderBlocks()"></div>${b.fields?b.fields.map(f=>`<div class="prop-group"><label>${f.label}</label>${f.type==='textarea'?`<textarea onchange="blocks.find(x=>x.id==='${b.id}').config.${f.name}=this.value">${b.config[f.name]||''}</textarea>`:`<input value="${b.config[f.name]||''}" onchange="blocks.find(x=>x.id==='${b.id}').config.${f.name}=this.value">`}</div>`).join(''):''}`;}
function runWorkflow(){if(!blocks.length){toast('Add blocks','error');return;}toast('Workflow started','info');}
function sendChat(){const inp=document.getElementById('chatInput');const msg=inp.value.trim();if(!msg)return;inp.value='';addChatMsg(msg,'user');processAI(msg);}
function aiSuggest(txt){addChatMsg(txt,'user');processAI(txt);}
function addChatMsg(txt,role){const c=document.getElementById('chatMessages');const d=document.createElement('div');d.className=`chat-msg ${role}`;d.textContent=txt;c.appendChild(d);c.scrollTop=c.scrollHeight;}
async function processAI(msg){const lower=msg.toLowerCase();if(lower.includes('email')){saveState();const def=CATEGORIES.find(c=>c.id==='msg').blocks.find(b=>b.id==='email_send');addBlockToCanvas({...def,category:'msg',catColor:'#22c55e'},200,150);addChatMsg('✅ Добавил блок "Отправить Email"','ai');}else if(lower.includes('звонок')||lower.includes('call')){saveState();const def=CATEGORIES.find(c=>c.id==='msg').blocks.find(b=>b.id==='call');addBlockToCanvas({...def,category:'msg',catColor:'#22c55e'},200,150);addChatMsg('✅ Добавил блок "Звонок"','ai');}else if(lower.includes('задержка')){saveState();const def=CATEGORIES.find(c=>c.id==='logic').blocks.find(b=>b.id==='delay');addBlockToCanvas({...def,category:'logic',catColor:'#f97316'},200,150);addChatMsg('✅ Добавил блок "Задержка"','ai');}else if(lower.includes('http')){saveState();const def=CATEGORIES.find(c=>c.id==='api').blocks.find(b=>b.id==='http_req');addBlockToCanvas({...def,category:'api',catColor:'#f59e0b'},200,150);addChatMsg('✅ Добавил блок "HTTP Запрос"','ai');}else{addChatMsg('Я умею: email, звонок, задержка, HTTP запрос. Просто опишите что нужно.','ai');}}
function saveState(){undoStack.push(JSON.stringify({blocks,connections,nextId}));if(undoStack.length>50)undoStack.shift();redoStack=[];}
function undo(){if(!undoStack.length)return;redoStack.push(JSON.stringify({blocks,connections,nextId}));const s=JSON.parse(undoStack.pop());blocks=s.blocks;connections=s.connections;nextId=s.nextId;selectedBlocks.clear();renderBlocks();updateStats();toast('Undo','info');}
function redo(){if(!redoStack.length)return;undoStack.push(JSON.stringify({blocks,connections,nextId}));const s=JSON.parse(redoStack.pop());blocks=s.blocks;connections=s.connections;nextId=s.nextId;selectedBlocks.clear();renderBlocks();updateStats();toast('Redo','info');}
function saveProject(){localStorage.setItem('flowbuilder',JSON.stringify({name:document.getElementById('projectName').value,blocks,connections,nextId}));toast('Saved','success');}
function filterBlocks(){const q=document.getElementById('blockSearch').value.toLowerCase();document.querySelectorAll('.category-items').forEach(i=>{i.querySelectorAll('.block-item').forEach(b=>{b.style.display=b.querySelector('.name').textContent.toLowerCase().includes(q)?'':'none';});});}
function updateStats(){document.getElementById('blockCount').textContent=blocks.length+' blocks';document.getElementById('connCount').textContent=connections.length+' connections';}
function switchTab(tab){document.querySelectorAll('.sidebar-tabs button').forEach(b=>b.classList.remove('active'));document.getElementById('tabProps').classList.add('hidden');document.getElementById('tabAI').classList.add('hidden');if(tab==='props'){document.querySelector('.sidebar-tabs button:first-child').classList.add('active');document.getElementById('tabProps').classList.remove('hidden');}else{document.querySelector('.sidebar-tabs button:last-child').classList.add('active');document.getElementById('tabAI').classList.remove('hidden');}}
window.onload=()=>{renderBlockList();setupCanvasEvents();updateStats();updateCanvasTransform();const demo={id:'email_send',name:'Отправить Email',icon:'📧',desc:'Отправляет письмо',ports:{in:1,out:1},fields:[{name:'to',label:'Кому',type:'text'}]};addBlockToCanvas({...demo,category:'msg',catColor:'#22c55e'},200,150);renderConnectorsList();selectModel('hf');document.addEventListener('click',e=>{if(!e.target.closest('.model-selector'))document.getElementById('modelDropdown')?.classList.remove('show');});};
</script></body></html>
